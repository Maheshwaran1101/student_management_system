{% extends 'base.html' %}

{% block title %}
Edit Student
{% endblock %}

{% block content %}

<h2>Edit Student</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>First Name</label>
<input type="text" name="first_name"
value="{{ student.first_name }}" class="form-control">
</div>

<div class="mb-3">
<label>Last Name</label>
<input type="text" name="last_name"
value="{{ student.last_name }}" class="form-control">
</div>

<div class="mb-3">
<label>Roll Number</label>
<input type="text" name="roll_number"
value="{{ student.roll_number }}" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email"
value="{{ student.email }}" class="form-control">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone"
value="{{ student.phone }}" class="form-control">
</div>

<div class="mb-3">
    <label>Course</label>

    <select name="course" class="form-control">

        {% for course in courses %}

            <option value="{{ course.id }}"
            {% if student.course.id == course.id %}selected{% endif %}>
                {{ course.course_name }}
            </option>

        {% endfor %}

    </select>

</div>

<div class="mb-3">
<label>Year</label>
<input type="number" name="year"
value="{{ student.year }}" class="form-control">
</div>

<div class="mb-3">
<label>Address</label>
<textarea name="address" class="form-control">{{ student.address }}</textarea>
</div>

<button class="btn btn-primary">
    Update Student
</button>

<a href="{% url 'student_list' %}" class="btn btn-secondary">
    Cancel
</a>

</form>

{% endblock %}
