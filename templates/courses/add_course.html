{% extends 'base.html' %}

{% block title %}Add Course{% endblock %}

{% block content %}

<h2>Add Course</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-success">
        Save
    </button>

    <a href="{% url 'course_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
