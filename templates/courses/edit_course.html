{% extends 'base.html' %}

{% block title %}Edit Course{% endblock %}

{% block content %}

<h2>Edit Course</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-primary">
        Update
    </button>

    <a href="{% url 'course_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
