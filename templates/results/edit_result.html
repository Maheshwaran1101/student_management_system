{% extends 'base.html' %}

{% block title %}
Edit Result
{% endblock %}

{% block content %}

<h2>Edit Result</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-primary">
        Update Result
    </button>

    <a href="{% url 'result_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
