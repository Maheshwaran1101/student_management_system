{% extends 'base.html' %}

{% block title %}
Add Result
{% endblock %}

{% block content %}

<h2>Add Result</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-success">
        Save Result
    </button>

    <a href="{% url 'result_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
